<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>視障兒童配對遊戲</title>
    <style>
        /* 基本重置 */
        body, h1, p, select, option, button {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
            font-size: 1.5rem;
        }

        /* 主題顏色變數 - 優化對比度 (不變) */
        :root {
            /* 黑色主題 */
            --bg-top-black: #111111;
            --bg-bottom-black: #000000;
            --text-color-black: #ffffff;
            --high-contrast-border-black: #ffffff; /* 黑色背景用白色邊框 */
            --btn-color-black: #222222;

            /* 白色主題 */
            --bg-top-white: #f5f5f5;
            --bg-bottom-white: #ffffff;
            --text-color-white: #000000;
            --high-contrast-border-white: #000000; /* 白色背景用黑色邊框 */
            --btn-color-white: #eeeeee;

            /* 黃色主題 */
            --bg-top-yellow: #e6e600;
            --bg-bottom-yellow: #ffff00;
            --text-color-yellow: #000000;
            --high-contrast-border-yellow: #000000; /* 黃色背景用黑色邊框 */
            --btn-color-yellow: #f0f000;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* 動態視窗高度 */
            width: 100vw;
            overflow: hidden; 
            touch-action: none; 
            -webkit-user-select: none; 
            user-select: none;
            -webkit-touch-callout: none; 
            overscroll-behavior: none; 
        }

        /* 應用主題背景色和文字顏色 */
        body.theme-black { background-color: var(--bg-bottom-black); color: var(--text-color-black); }
        body.theme-white { background-color: var(--bg-bottom-white); color: var(--text-color-white); }
        body.theme-yellow { background-color: var(--bg-bottom-yellow); color: var(--text-color-yellow); }

        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* 設定區域 */
        .settings {
            width: 100%;
            padding: 10px 15px;
            display: flex;
            justify-content: space-around;
            flex: 0 0 auto; 
            z-index: 10;
        }
        /* 設定區域邊框也使用高對比度顏色，強化分區 */
        .theme-black .settings { background-color: var(--bg-top-black); border-bottom: 4px solid var(--high-contrast-border-black);}
        .theme-white .settings { background-color: var(--bg-top-white); border-bottom: 4px solid var(--high-contrast-border-white);}
        .theme-yellow .settings { background-color: var(--bg-top-yellow); border-bottom: 4px solid var(--high-contrast-border-yellow);}

        /* 上方目標區域 */
        #top-section {
            width: 100%;
            flex: 1; /* 分配較少空間 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 15px solid; /* 超粗的視覺分隔線 */
            padding: 10px;
        }
        /* 目標區域高對比度邊框顏色 */
        .theme-black #top-section { background-color: var(--bg-top-black); border-bottom-color: var(--high-contrast-border-black); }
        .theme-white #top-section { background-color: var(--bg-top-white); border-bottom-color: var(--high-contrast-border-white); }
        .theme-yellow #top-section { background-color: var(--bg-top-yellow); border-bottom-color: var(--high-contrast-border-yellow); }

        /* 目標圖片樣式 */
        #target-image {
            width: auto;
            height: auto;
            max-height: 20vh; /* 縮小目標圖片高度 */
            border: 10px solid; /* 超粗高對比度邊框 */
            border-radius: 20px;
            padding: 10px;
            background-color: #fff; /* 確保透明 JPG 顯示正常 */
            transition: all 0.3s ease; 
        }
        /* 目標圖片高對比度邊框顏色 */
        .theme-black #target-image { border-color: var(--high-contrast-border-black); }
        .theme-white #target-image { border-color: var(--high-contrast-border-white); }
        .theme-yellow #target-image { border-color: var(--high-contrast-border-yellow); }

        /* --- 答對時的發光放大動畫 --- */
        .glow-effect {
            animation: success-glow 0.6s ease-in-out infinite alternate;
            z-index: 1000;
            /* 答對時邊框變綠色，不使用主題顏色，強調答對 */
            border-color: #00ff00 !important; 
        }

        @keyframes success-glow {
            from {
                box-shadow: 0 0 15px #00ff00;
                transform: scale(1);
            }
            to {
                box-shadow: 0 0 50px #00ff00, 0 0 100px #00ff00;
                transform: scale(1.1); /* 稍微放大 */
            }
        }

        /* 下方選項區域 */
        #bottom-section {
            width: 100%;
            flex: 1.5; /* 分配大於上半部的空間，約佔全畫面 60% 高度 */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px; 
        }

        /* 統一橫向排列設計 */
        #options-area {
            width: 100%;
            max-width: 1300px; /* 稍微放大最大寬度以容納間距 */
            height: 100%;
            display: flex;
            flex-direction: row; 
            justify-content: space-evenly; 
            align-items: center;
            /* 【修改重點】顯著加大圖片之間的間距，防止貼在一起 */
            gap: 50px; 
        }

        /* 選項按鈕樣式 */
        .option-btn {
            flex: 1 1 0; 
            height: 90%; /* 按鈕高度佔滿區域的 90% */
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; 
            position: relative;
            background-color: transparent;
            
            border: none;
            cursor: grab;
            
            /* 【修改重點】按鈕本身加入左右 Padding，確保圖片邊框絕對不會互相接觸 */
            padding: 0 15px; 
        }
        .option-btn:active { cursor: grabbing; }

        /* 選項圖片樣式 - 圖片巨大化與高對比邊框 */
        .option-img {
            /* 調整寬度計算，減去 Padding 的影響 */
            width: 100%;
            height: 100%;
            /* 將圖片最大高度設為 35dvh，確保非常巨大 */
            max-height: 35dvh; 
            object-fit: contain; /* 確保圖片不變形 */
            background-color: #fff;
            border-radius: 20px;
            pointer-events: none; 
            
            /* 超粗高對比度顏色邊框 (不變) */
            border: 10px solid; 
            padding: 10px;
        }
        
        /* 選項圖片高對比度邊框顏色應用 */
        .theme-black .option-img { border-color: var(--high-contrast-border-black); }
        .theme-white .option-img { border-color: var(--high-contrast-border-white); }
        .theme-yellow .option-img { border-color: var(--high-contrast-border-yellow); }

        #replay-audio-btn {
            margin-top: 5px;
            padding: 5px 15px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body class="theme-black">
    <div id="start-overlay" onclick="startGame()">
        點擊畫面開始遊戲
    </div>
    
    <div class="settings">
        <div>
            <label for="bgColorSelect">背景顏色：</label>
            <select id="bgColorSelect">
                <option value="theme-black" selected>黑色</option>
                <option value="theme-white">白色</option>
                <option value="theme-yellow">黃色</option>
            </select>
        </div>
        <div>
            <label for="modeSelect">模式：</label>
            <select id="modeSelect">
                <option value="2">2 選 1</option>
                <option value="3">3 選 1</option>
                <option value="4" selected>4 選 1</option>
            </select>
        </div>
    </div>

    <div id="top-section">
        <p>請將一樣的物品拖拉到這裡：</p>
        <img id="target-image" src="" alt="目標物品">
        <button id="replay-audio-btn" onclick="playQuestionAudio()">🔊 再聽一次題目</button>
    </div>

    <div id="bottom-section">
        <div id="options-area">
        </div>
    </div>

    <script>
        // --- 遊戲資料 (不變) ---
        const images = ['image_0.jpg', 'image_1.JPG', 'image_2.JPG', 'image_3.JPG'];
        const itemNames = ['足球', '蘋果', '香蕉', '杯子'];

        // 獲取 HTML 元素
        const body = document.body;
        const bgColorSelect = document.getElementById('bgColorSelect');
        const modeSelect = document.getElementById('modeSelect');
        const targetImage = document.getElementById('target-image');
        const optionsArea = document.getElementById('options-area');
        const startOverlay = document.getElementById('start-overlay');

        // 遊戲狀態變數
        let targetIndex = 0;
        let currentGameMode = parseInt(modeSelect.value);
        let isProcessing = false; 

        // --- 聲音與語音 (不變) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let synth = window.speechSynthesis;
        
        // 建立拍手聲物件 (需要下載 clap.mp3)
        const clapSound = new Audio('clap.mp3');

        function startGame() {
            startOverlay.style.display = 'none';
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const unlockUtterance = new SpeechSynthesisUtterance('');
            synth.speak(unlockUtterance);
            
            // 解鎖 iOS 上的音效播放權限
            clapSound.play().then(() => {
                clapSound.pause();
                clapSound.currentTime = 0;
            }).catch(() => {});

            nextLevel();
        }

        function playQuestionAudio() {
            if (synth.speaking) synth.cancel(); 
            const textToSpeak = `請選出「${itemNames[targetIndex]}」`;
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'zh-HK'; 
            utterance.rate = 0.9; 
            synth.speak(utterance);
        }

        function playBeep(frequency, duration, type = 'sine') {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = type; 
            oscillator.frequency.value = frequency; 
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function playCorrectSound() {
            clapSound.currentTime = 0;
            const playPromise = clapSound.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    playBeep(523.25, 0.15, 'sine'); 
                    setTimeout(() => playBeep(659.25, 0.15, 'sine'), 150); 
                    setTimeout(() => playBeep(783.99, 0.4, 'sine'), 300); 
                });
            }
            
            const cheerUtterance = new SpeechSynthesisUtterance("好叻呀！");
            cheerUtterance.lang = 'zh-HK';
            cheerUtterance.rate = 1.1;
            synth.speak(cheerUtterance);
        }

        function playWrongSound() {
            playBeep(250, 0.4, 'triangle'); 
        }

        // --- 拖拉互動邏輯 (不變) ---
        let draggedElement = null;
        let startX = 0, startY = 0;

        function handlePointerDown(e) {
            if (isProcessing) return; 

            draggedElement = e.currentTarget;
            startX = e.clientX;
            startY = e.clientY;
            
            draggedElement.style.zIndex = 1000;
            draggedElement.style.transition = ''; 
            draggedElement.setPointerCapture(e.pointerId);

            draggedElement.onpointermove = handlePointerMove;
            draggedElement.onpointerup = handlePointerUp;
            draggedElement.onpointercancel = handlePointerUp;
        }

        function handlePointerMove(e) {
            if (!draggedElement) return;
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;
            draggedElement.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
        }

        function handlePointerUp(e) {
            if (!draggedElement) return;
            
            draggedElement.releasePointerCapture(e.pointerId);
            draggedElement.onpointermove = null;
            draggedElement.onpointerup = null;
            draggedElement.onpointercancel = null;

            draggedElement.style.visibility = 'hidden';
            const elemBelow = document.elementFromPoint(e.clientX, e.clientY);
            draggedElement.style.visibility = 'visible';

            const dropZone = document.getElementById('target-image');
            
            if (elemBelow === dropZone || (elemBelow && elemBelow.closest('#top-section'))) {
                checkAnswer(draggedElement);
            } else {
                snapBack(draggedElement);
                draggedElement = null; 
            }
        }

        function snapBack(element) {
            element.style.transition = 'transform 0.3s ease-out';
            element.style.transform = 'translate(0px, 0px)';
            element.style.zIndex = '';
        }

        function checkAnswer(element) {
            isProcessing = true; 
            const clickedIdx = parseInt(element.dataset.index);

            // 獲取按鈕內的圖片元素
            const optionImg = element.querySelector('.option-img');

            if (clickedIdx === targetIndex) {
                playCorrectSound();
                
                // 選項圖片加入答對發光特效，並縮放
                optionImg.classList.add('glow-effect');
                // 將選項移到目標區域上方
                element.style.zIndex = 1000;
                element.style.transition = 'all 0.5s ease-out';
                element.style.transform = `translate(0px, -50vh) scale(1.1)`; // 往上移動並放大

                targetImage.classList.add('glow-effect'); // 目標區也發光
                
                setTimeout(() => {
                    optionImg.classList.remove('glow-effect'); // 移除特效
                    targetImage.classList.remove('glow-effect'); 
                    nextLevel(); 
                }, 2500); 
            } else {
                playWrongSound();
                // 錯了，邊框變紅色 (針對圖片元素修改)
                optionImg.style.borderColor = '#ff0000'; 
                snapBack(element); 
                
                setTimeout(() => {
                    optionImg.style.borderColor = ''; // 恢復主題邊框顏色
                    draggedElement = null;
                    isProcessing = false; 
                }, 500);
            }
        }

        // --- 遊戲流程 (不變) ---
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function displayOptions(targetIdx, numberOfOptions) {
            optionsArea.innerHTML = ''; 
            
            const options = [targetIdx];
            let availableWrongIndices = images.map((_, index) => index).filter(index => index !== targetIdx);
            
            let wrongOptionsToAdd = numberOfOptions - 1;
            for (let i = 0; i < wrongOptionsToAdd; i++) {
                if (availableWrongIndices.length === 0) break;
                const randomIndex = Math.floor(Math.random() * availableWrongIndices.length);
                options.push(availableWrongIndices.splice(randomIndex, 1)[0]);
            }

            shuffle(options);

            options.forEach(idx => {
                const button = document.createElement('div'); 
                button.className = 'option-btn';
                button.dataset.index = idx;
                button.onpointerdown = handlePointerDown;

                const img = document.createElement('img');
                img.src = images[idx];
                img.className = 'option-img';
                
                button.appendChild(img);
                optionsArea.appendChild(button);
            });
        }

        function nextLevel() {
            targetIndex = Math.floor(Math.random() * images.length);
            targetImage.src = images[targetIndex];
            
            displayOptions(targetIndex, currentGameMode);
            
            isProcessing = false; 
            
            setTimeout(playQuestionAudio, 500);
        }

        // --- 設定選單 ---
        bgColorSelect.onchange = (event) => {
            body.className = event.target.value; 
        };

        modeSelect.onchange = (event) => {
            currentGameMode = parseInt(event.target.value);
            nextLevel(); 
        };
    </script>
</body>
</html>
